# 基础配置文件 - 所有环境共享的配置

# 服务器基础配置
server:
  servlet:
    context-path: /api
    session:
      timeout: PT60M # session过期时间 60M 一个小时

# Spring 基础配置
spring:
  # 多部分文件上传配置
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB
  
  # 通用配置
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  
  # SQL 初始化配置 (Spring Boot 3)
  sql:
    init:
      # 数据库初始化脚本位置
      schema-locations: classpath:schema.sql
      continue-on-error: true
  
  # 邮件配置 - 基础设置
  mail:
    host: smtp.qq.com
    port: 465
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
  
  # 开启虚拟线程
  threads:
    virtual:
      enabled: true

# QQ登录相关 - 基础URL配置
qq:
  url:
    authorization: https://graph.qq.com/oauth2.0/authorize?response_type=code&client_id=%s&redirect_uri=%s&state=%s
    access:
      token: https://graph.qq.com/oauth2.0/token?grant_type=authorization_code&client_id=%s&client_secret=%s&code=%s&redirect_uri=%s
    openid: https://graph.qq.com/oauth2.0/me?access_token=%S
    user:
      info: https://graph.qq.com/user/get_user_info?access_token=%s&oauth_consumer_key=%s&openid=%s

# 用户相关配置
user:
  # 默认用户空间大小 1GB
  space:
    default: 1024

# 管理员配置
admin:
  emails: admin@qq.com # 明文密码 admin123456